kind = "web"
previewPath = "/"
title = "TrackNova"
version = "1.0.0"
id = "artifacts/tracknova"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25494

[services.development]
run = "pnpm --filter @workspace/tracknova run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tracknova", "run", "build" ]
publicDir = "frontend/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25494"
BASE_PATH = "/"
