name: Selenium CI/CD
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 9
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'pnpm'
        
    - name: Install Dependencies
      run: pnpm install
      
    - name: Build Project
      run: pnpm run build
      
    - name: Setup Chrome WebDriver
      uses: nanasess/setup-chromedriver@v2
      
    - name: Install Selenium Test Dependencies
      working-directory: ./frontend/selenium-tests
      run: npm install
      
    - name: Run Dev Server in Background
      run: |
        pnpm --filter @workspace/tracknova run dev &
        sleep 10 # Wait for server to start
      
    - name: Run Selenium E2E Tests
      working-directory: ./frontend/selenium-tests
      run: npm run login
