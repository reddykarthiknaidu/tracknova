databases:
  - name: tracknova-db
    databaseName: tracknova
    user: tracknova_user
    plan: free

services:
  - type: web
    name: tracknova-api
    env: node
    plan: free
    buildCommand: pnpm install && pnpm run build
    startCommand: cd backend && node ./dist/index.mjs
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tracknova-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
